<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPot QR Demo Tables</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 32px 24px;
      text-align: center;
      min-width: 200px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      color: #FF6B35;
    }
    .card p {
      margin: 0 0 20px;
      font-size: 12px;
      color: #888;
      font-family: monospace;
    }
    .qr { display: inline-block; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Table T001</h2>
    <p>ipot://table/T001</p>
    <div class="qr" id="qr1"></div>
  </div>

  <div class="card">
    <h2>Table T002</h2>
    <p>ipot://table/T002</p>
    <div class="qr" id="qr2"></div>
  </div>

  <div class="card">
    <h2>Table T003</h2>
    <p>ipot://table/T003</p>
    <div class="qr" id="qr3"></div>
  </div>

  <script>
    [
      { id: 'qr1', text: 'ipot://table/T001' },
      { id: 'qr2', text: 'ipot://table/T002' },
      { id: 'qr3', text: 'ipot://table/T003' },
    ].forEach(({ id, text }) => {
      new QRCode(document.getElementById(id), {
        text,
        width: 200,
        height: 200,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      });
    });
  </script>
</body>
</html>
